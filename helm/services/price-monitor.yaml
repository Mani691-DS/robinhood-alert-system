apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-monitor
  template:
    metadata:
      labels:
        app: price-monitor
    spec:
      containers:
        - name: price-monitor
          image: price-monitor:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: app-config
