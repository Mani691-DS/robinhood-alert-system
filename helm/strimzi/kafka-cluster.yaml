# Strimzi KRaft-mode Kafka cluster for Minikube (single-node, ephemeral storage)
#
# Prerequisites:
#   helm repo add strimzi https://strimzi.io/charts/
#   helm install strimzi-operator strimzi/strimzi-kafka-operator \
#     --namespace strimzi-system --create-namespace --wait
#
# Then apply this file:
#   kubectl apply -f helm/strimzi/kafka-cluster.yaml -n stock-alert

# Combined controller + broker node pool (single-node KRaft, no Zookeeper)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: combined
  labels:
    strimzi.io/cluster: stock-alert-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: stock-alert-kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.7.0
    metadataVersion: 3.7-IV4
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      default.replication.factor: "1"
      min.insync.replicas: "1"
      auto.create.topics.enable: "true"
  entityOperator:
    topicOperator: {}
    userOperator: {}
