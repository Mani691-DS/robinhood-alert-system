apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-alert-service
spec:
  replicas: {{ .Values.alertService.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-alert-service
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-alert-service
    spec:
      containers:
        - name: alert-service
          image: alert-service:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.alertService.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.alertService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.alertService.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-alert-service
spec:
  selector:
    app: {{ .Release.Name }}-alert-service
  type: NodePort
  ports:
    - port: {{ .Values.alertService.port }}
      targetPort: {{ .Values.alertService.port }}
      nodePort: {{ .Values.alertService.nodePort }}
