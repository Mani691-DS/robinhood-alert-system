apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-price-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-price-monitor
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-price-monitor
    spec:
      containers:
        - name: price-monitor
          image: price-monitor:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
